name: Release Version Sync

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync, for example v1.2.3"
        required: true

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Update version references
        run: |
          ./scripts/update-version.sh "$TAG_NAME"
          git diff -- config/config.go README.md packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/debian/changelog

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/config.go README.md packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/debian/changelog
          if git diff --cached --quiet; then
            echo "Version references are already up to date."
            exit 0
          fi
          git commit -m "Update version references for ${TAG_NAME}"
          git push

  build-release:
    runs-on: ubuntu-latest
    needs: sync-version
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: |
          make download_deps

      - name: Build release binaries with tag version
        run: |
          VERSION="${TAG_NAME#v}"
          make VERSION="$VERSION" build_all

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            sshtm-linux-amd64
            sshtmd-linux-amd64
            sshtm-darwin-amd64
            sshtmd-darwin-amd64
            sshtm-darwin-arm64
            sshtmd-darwin-arm64
