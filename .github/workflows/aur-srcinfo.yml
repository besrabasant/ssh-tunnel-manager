name: AUR Srcinfo

on:
  push:
    paths:
      - "packaging/arch/PKGBUILD"
      - "packaging/arch/sshtm.install"
      - "packaging/arch/sshtm.path.sh"
      - "packaging/arch/sshtmd.service"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base tools
        run: |
          pacman -Sy --noconfirm base-devel git

      - name: Generate .SRCINFO
        run: |
          useradd -m build
          chown -R build:build "$GITHUB_WORKSPACE/packaging/arch"
          runuser -u build -- bash -c "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --printsrcinfo > .SRCINFO"

      - name: Check .SRCINFO up to date
        run: |
          git -C "$GITHUB_WORKSPACE" diff --exit-code -- packaging/arch/.SRCINFO
